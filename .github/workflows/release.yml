name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG#v}"
          MANIFEST_VERSION=$(sed -n 's/.*"\.\": "\([^"]*\)".*/\1/p' .release-please-manifest.json)
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag $TAG does not match .release-please-manifest.json VERSION=$MANIFEST_VERSION"
            exit 1
          fi

      - name: Build deb
        run: make deb

      - name: Prepare latest alias
        run: cp nullpointerpunch_*_all.deb nullpointerpunch_all.deb

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nullpointerpunch_*_all.deb
            nullpointerpunch_all.deb
          generate_release_notes: true
