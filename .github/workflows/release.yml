name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG#v}"
          SCRIPT_VERSION=$(grep '^VERSION=' bin/ぬるぽ | cut -d= -f2 | tr -d '"')
          if [ "$TAG_VERSION" != "$SCRIPT_VERSION" ]; then
            echo "Tag $TAG does not match bin/ぬるぽ VERSION=$SCRIPT_VERSION"
            exit 1
          fi

      - name: Build deb
        run: make deb

      - name: Prepare latest alias
        run: cp nullpointerpunch_*_all.deb nullpointerpunch_all.deb

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nullpointerpunch_*_all.deb
            nullpointerpunch_all.deb
          generate_release_notes: true
